# Minimal Postgres for local development (§13). The app connects on localhost:5432.
services:
  postgres:
    image: postgres:16-alpine
    container_name: workshop-postgres
    environment:
      POSTGRES_USER: workshop
      POSTGRES_PASSWORD: workshop
      POSTGRES_DB: workshop
    ports:
      - "5432:5432"
    volumes:
      - workshop-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workshop -d workshop"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  workshop-pgdata:
