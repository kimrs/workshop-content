name: Deploy slides

on:
  push:
    branches: [main]
    paths:
      - "How-exciting-new-csharp-features-make-our-code-explicit/talk/**"
      - ".github/workflows/deploy-slides.yml"
  workflow_dispatch:

concurrency:
  group: deploy-slides
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: How-exciting-new-csharp-features-make-our-code-explicit/talk
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: How-exciting-new-csharp-features-make-our-code-explicit/talk/package-lock.json

      - run: npm ci

      # Served at solstad.dev/closed-union-slides/ — the base path must match the repo name
      - run: npm run build -- --base /closed-union-slides/

      - uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.SLIDES_DEPLOY_TOKEN }}
          external_repository: kimrs/closed-union-slides
          publish_branch: gh-pages
          publish_dir: How-exciting-new-csharp-features-make-our-code-explicit/talk/dist
          force_orphan: true
