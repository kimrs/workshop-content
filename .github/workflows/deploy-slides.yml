name: Deploy slides

on:
  push:
    branches: [main]
    paths:
      - "How-exciting-new-csharp-features-make-our-code-explicit/talk/**"
      - ".github/workflows/deploy-slides.yml"
  workflow_dispatch:

concurrency:
  group: deploy-slides
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: How-exciting-new-csharp-features-make-our-code-explicit/talk
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: How-exciting-new-csharp-features-make-our-code-explicit/talk/package-lock.json

      - run: npm ci

      # Served at solstad.dev/<repo-name>/ — deriving the base from the repo
      # name keeps forks/copies of this repo publishing without edits
      - run: npm run build -- --base /${{ github.event.repository.name }}/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: How-exciting-new-csharp-features-make-our-code-explicit/talk/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
